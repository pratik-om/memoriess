<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Memories</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    background:#ffffff;
    color:#222;
}

/* Logo */

.logo{
    padding:25px 40px;
    font-size:42px;
    font-family:'Dancing Script',cursive;
    color:#6c63ff;
    font-weight:bold;
}

/* Hero Section */

.hero{
    text-align:center;
    padding:10px 20px 40px;
}

.hero h1{
    font-size:65px;
    color:#101a5c;
    line-height:1.2;
}

.hero span{
    color:#6c63ff;
    font-family:'Dancing Script',cursive;
}

.hero p{
    max-width:700px;
    margin:20px auto;
    color:#666;
    font-size:18px;
}

.btn{
    display:inline-block;
    margin-top:15px;
    padding:15px 40px;
    background:#6c63ff;
    color:white;
    text-decoration:none;
    border-radius:50px;
    font-size:18px;
    font-weight:600;
    transition:0.3s;
}

.btn:hover{
    transform:translateY(-3px);
}

/* Gallery */

.gallery{
    width:90%;
    max-width:1300px;
    margin:50px auto;
    display:grid;
    grid-template-columns:1fr 2fr 1fr;
    gap:15px;
    align-items:center;
}

.left,
.right{
    width:100%;
    aspect-ratio:1/1;
    object-fit:cover;
    border-radius:20px;
    box-shadow:0 5px 20px rgba(0,0,0,.15);
}

.center{
    width:100%;
    height:450px;
    object-fit:cover;
    border-radius:20px;
    box-shadow:0 5px 20px rgba(0,0,0,.15);
}

.bottom{
    width:90%;
    max-width:900px;
    margin:0 auto 60px;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
}

.bottom img{
    width:100%;
    aspect-ratio:1/1;
    object-fit:cover;
    border-radius:20px;
    box-shadow:0 5px 20px rgba(0,0,0,.15);
}

/* Mobile */

@media(max-width:768px){

.logo{
    text-align:center;
    font-size:34px;
}

.hero h1{
    font-size:40px;
}

.hero p{
    font-size:16px;
}

.gallery{
    grid-template-columns:1fr;
}

.center{
    height:280px;
}

.bottom{
    grid-template-columns:1fr;
}
}

</style>
</head>
<body>

<div class="logo">
    Memories
</div>

<section class="hero">

    <h1>
        Capturing <span>Lasting</span> Memories
    </h1>

    <p>
        Keep your family photos and videos together forever.
        Every trip, celebration, and special moment in one place.
    </p>

    <a href="albums.html" class="btn">
        Enter Memories
    </a>

</section>

<div class="gallery">

    <img src="photo1.jpg" class="left">

    <img src="photo2.jpg" class="center">

    <img src="photo3.jpg" class="right">

</div>

<div class="bottom">

    <img src="photo4.jpg">

    <img src="photo5.jpg">

</div>

</body>
</html>
