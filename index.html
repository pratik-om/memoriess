<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memories</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f8f8f8;
    color:#222;
}

.container{
    max-width:1200px;
    margin:auto;
    padding:20px;
}

.logo{
    width:220px;
    margin-bottom:20px;
}

.hero{
    text-align:center;
    margin-top:20px;
}

.hero h1{
    font-size:60px;
    margin-bottom:15px;
}

.hero p{
    font-size:20px;
    color:#666;
    max-width:700px;
    margin:auto;
    line-height:1.6;
}

.btn{
    display:inline-block;
    margin-top:30px;
    padding:15px 40px;
    background:#4f46e5;
    color:white;
    text-decoration:none;
    border-radius:50px;
    font-size:18px;
    transition:.3s;
}

.btn:hover{
    transform:scale(1.05);
}

.gallery{
    margin-top:60px;
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:15px;
}

.gallery img{
    width:100%;
    height:250px;
    object-fit:cover;
    border-radius:15px;
    transition:.3s;
}

.gallery img:hover{
    transform:translateY(-5px);
}

.big{
    grid-column:span 2;
    grid-row:span 2;
    height:515px !important;
}

@media(max-width:768px){

.hero h1{
    font-size:40px;
}

.gallery{
    grid-template-columns:repeat(2,1fr);
}

.big{
    grid-column:span 2;
    height:300px !important;
}
}
</style>
</head>

<body>

<div class="container">

<img src="logo.png" class="logo">

<div class="hero">
    <h1>Capturing Lasting Memories</h1>

    <p>
        Keep your family memories alive forever.
        Store your trips, birthdays, weddings and special moments in one place.
    </p>

    <a href="albums.html" class="btn">
        Enter Memories
    </a>
</div>

<div class="gallery">

<img src="images/photo1.jpg">
<img src="images/photo2.jpg">

<img src="images/photo3.jpg" class="big">

<img src="images/photo4.jpg">
<img src="images/photo5.jpg">
<img src="images/photo6.jpg">

</div>

</div>

</body>
</html>
