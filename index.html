<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memories</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    background:#fff;
    color:#222;
}

.logo{
    padding:20px 40px;
}

.logo img{
    height:60px;
}

.hero{
    text-align:center;
    padding:20px;
}

.hero h1{
    font-size:60px;
    font-weight:700;
    color:#111a5a;
}

.hero h1 span{
    font-family:'Dancing Script',cursive;
    color:#6c63ff;
}

.hero p{
    margin-top:15px;
    color:#666;
    font-size:18px;
}

.btn{
    display:inline-block;
    margin-top:30px;
    padding:14px 35px;
    background:#6c63ff;
    color:white;
    text-decoration:none;
    border-radius:30px;
    font-weight:600;
    transition:.3s;
}

.btn:hover{
    transform:scale(1.05);
}

.gallery{
    width:90%;
    max-width:1200px;
    margin:50px auto;
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:15px;
}

.gallery img{
    width:100%;
    height:250px;
    object-fit:cover;
    border-radius:15px;
    transition:.3s;
}

.gallery img:hover{
    transform:scale(1.03);
}

.big{
    grid-column:span 2;
    grid-row:span 2;
    height:515px !important;
}

@media(max-width:768px){

.hero h1{
    font-size:38px;
}

.gallery{
    grid-template-columns:repeat(2,1fr);
}

.big{
    height:300px !important;
}
}
</style>
</head>

<body>

<div class="logo">
    <!-- Replace logo.png with your logo -->
    <img src="logo.png" alt="Memories Logo">
</div>

<section class="hero">

    <h1>
        Capturing <span>Lasting</span> Memories
    </h1>

    <p>
        Keep your family photos and videos together forever.
    </p>

    <a href="albums.html" class="btn">
        Enter Memories
    </a>

</section>

<div class="gallery">

    <img src="photo1.jpg">
    <img src="photo2.jpg">

    <img src="photo3.jpg" class="big">


</div>

</body>
</html>
