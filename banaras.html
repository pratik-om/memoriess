<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Banaras Memories</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f5f7fa;
    padding:20px;
}

.back-btn{
    display:inline-block;
    margin-bottom:20px;
    text-decoration:none;
    color:#4f46e5;
    font-weight:bold;
}

h1{
    text-align:center;
    margin-bottom:30px;
    color:#1e3a8a;
}

.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:15px;
    max-width:1200px;
    margin:auto;
}

.gallery img{
    width:100%;
    border-radius:15px;
    object-fit:cover;
    box-shadow:0 4px 10px rgba(0,0,0,0.15);
    transition:0.3s;
}

.gallery img:hover{
    transform:scale(1.03);
}
</style>

</head>
<body>

<a href="albums.html" class="back-btn">⬅ Back to Albums</a>

<h1>🛕 Banaras Memories</h1>

<div class="gallery">

    <img src="photo2.jpg">
<img src="photo3.jpg">
<img src="photo4.jpg">
<img src="photo5.jpg">

</div>

</body>
</html>
